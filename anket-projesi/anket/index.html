<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="#">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
          rel="stylesheet">

    <title>Anket</title>
</head>

<body class="bg-light">

    <!-- HEADER -->
    <section id="header">
        <div class="bg-white text-center py-5">
            <div class="container">
                <h2 class="text-danger display-6">Yazılımcının uzaktan çalışması</h2>
            </div>
        </div>
    </section>
<!-- RESULT -->
<section class="result d-none bg-light text-center py-4">
    <div class="container">
        <p class="lead text-dark">
            Sonucunuz: <span class="text-danger fw-bold">0%</span>
        </p>
    </div>
</section>
    <!-- QUESTIONS -->
    <section id="questions" class="bg-secondary py-5">
        <div class="container">
            <form class="question-form text-white">

                <!-- SORU 1 -->
                <div class="mb-4">
                    <p>1. Ofiste daha verimli çalışırım.</p>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" 
                               name="question1" value="evet" required>
                        <label class="form-check-label">Evet</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" 
                               name="question1" value="hayir">
                        <label class="form-check-label">Hayır</label>
                    </div>
                </div>

                <!-- SORU 2 -->
                <div class="mb-4">
                    <p>2. Evde daha verimli çalışırım.</p>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" 
                               name="question2" value="evet" required>
                        <label class="form-check-label">Evet</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" 
                               name="question2" value="hayir">
                        <label class="form-check-label">Hayır</label>
                    </div>
                </div>

                <!-- SORU 3 -->
                <div class="mb-4">
                    <p>3. Evden çalışmak zaman tasarrufu sağlar.</p>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" 
                               name="question3" value="evet" required>
                        <label class="form-check-label">Evet</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" 
                               name="question3" value="hayir">
                        <label class="form-check-label">Hayır</label>
                    </div>
                </div>

                <!-- SORU 4 -->
                <div class="mb-4">
                    <p>4. Hibrit çalışma modeli daha verimlidir.</p>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" 
                               name="question4" value="evet" required>
                        <label class="form-check-label">Evet</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" 
                               name="question4" value="hayir">
                        <label class="form-check-label">Hayır</label>
                    </div>
                </div>

                <!-- SUBMIT -->
                <div class="text-center">
                    <input type="submit" class="btn btn-danger mt-3" value="Gönder">
                </div>

            </form>
        </div>
    </section>

    <script src="derya.js"></script>

</body>
</html>
